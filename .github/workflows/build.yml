name: Build AUR Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged # Ważne dla makepkg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git rclone powershell qt6-webengine

      - name: Build Packages
        run: |
          # Twoja lista paczek w bashu (kolejność ma znaczenie!)
          PKGS=("coolercontrold-bin" "coolercontrol" "paru-bin" "visual-studio-code-bin")
          
          # Ustawienie uprawnień (makepkg nie lubi roota)
          useradd builder -m
          passwd -d builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chown -R builder:builder .

          sudo -u builder bash -c '
            mkdir -p x86_64
            for pkg in "'${PKGS[@]}'"; do
              git clone https://aur.archlinux.org/$pkg.git
              cd $pkg
              makepkg -s --noconfirm
              cp *.pkg.tar.zst ../x86_64/
              cd ..
            done
          '

      - name: Clean and Update Database (PowerShell)
        shell: pwsh
        run: |
          ./.github/workflows/clean.ps1

      - name: Sync to OneDrive
        env:
          RCLONE_CONFIG_BODY: ${{ secrets.RCLONE_CONFIG }}
        run: |
          # Tworzymy config rclone w locie
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BODY" > ~/.config/rclone/rclone.conf
          
          # SYNC zamiast COPY - to usunie pliki debug z OneDrive!
          rclone sync ./x86_64 onedrive_personal:Arch/x86_64 --vfs-cache-mode full

      - name: Commit Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add x86_64/*.db* x86_64/*.files*
          git commit -m "Update repository database [skip ci]" || echo "No changes to commit"
          git push
