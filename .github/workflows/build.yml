name: Build AUR Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm base-devel git rclone sudo

      - name: Build Packages
        run: |
          # 1. Przygotowanie użytkownika
          useradd builder -m
          passwd -d builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chown -R builder:builder .

          # 2. Definicja pakietów jako zwykły ciąg znaków
          export PKGS="masterpdfeditor-free touche paru powershell-lts-bin arduino-ide-bin visual-studio-code-bin ytmdesktop-bin clion calamares hplip-plugin"

          # 3. Uruchomienie budowania
          sudo -E -u builder bash -e << 'EOF'
            mkdir -p x86_64
            for pkg in $PKGS; do
              echo "--- Building $pkg ---"
              git clone "https://aur.archlinux.org/$pkg.git"
              cd "$pkg"
              # Nie używamy sudo wewnątrz, bo już jesteśmy użytkownikiem builder
              makepkg -s --noconfirm --nocheck --skippgpcheck
              cp *.pkg.tar.zst ../x86_64/
              cd ..
            done
          EOF

      - name: Clean and Update Database
        run: |
          # Poprawiona nazwa pliku (musi być zgodna z tym co masz w repo)
          chmod +x .github/workflows/clean.sh
          ./.github/workflows/clean.sh

      - name: Clean and Update Database
        run: |
          chmod +x .github/workflows/clean-repo.sh
          ./.github/workflows/clean.sh

      - name: Sync to OneDrive
        env:
          RCLONE_CONFIG_BODY: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BODY" > ~/.config/rclone/rclone.conf
          # rclone sync usunie pliki debug z chmury, bo nie ma ich już w ./x86_64
          rclone sync ./x86_64 onedrive_personal:Arch/x86_64 --vfs-cache-mode full

      - name: Commit Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add x86_64/*.db* x86_64/*.files*
          git commit -m "Update repository database [skip ci]" || echo "No changes to commit"
          git push
