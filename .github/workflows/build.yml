name: Weekly Rolling Build
on:
  schedule:
    - cron: '0 0 * * 0' # Co niedzielę o 00:00
  workflow_dispatch: # Pozwala też uruchomić ręcznie przyciskiem

jobs:
  build-n-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build in Docker (Arch Linux)
        uses: jscatena/run-arch-action@v1 # Uruchamia kroki wewnątrz kontenera Arch
        with:
          install: base-devel git rclone
          run: |
            # 1. Konfiguracja użytkownika do budowania
            useradd -m builder
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chown -R builder:builder .
            
            # 2. Lista paczek do zbudowania
            PACKAGES=(
              "masterpdfeditor-free" "touche" "paru-bin" "powershell-lts-bin" 
              "arduino-ide-bin" "visual-studio-code-bin" "ytmdesktop-bin" 
              "clion" "calamares" "hplip-plugin"
            )

            # 3. Pętla budująca
            mkdir -p x86_64
            for pkg in "${PACKAGES[@]}"; do
              echo "--- Building $pkg ---"
              sudo -u builder git clone https://aur.archlinux.org/$pkg.git
              cd $pkg
              sudo -u builder makepkg -s --noconfirm
              cp *.pkg.tar.zst ../x86_64/
              cd ..
            done

            # 4. Aktualizacja bazy danych
            cd x86_64
            repo-add aur_repo.db.tar.gz *.pkg.tar.zst
            rm -f aur_repo.db aur_repo.files
            cp aur_repo.db.tar.gz aur_repo.db
            cp aur_repo.files.tar.gz aur_repo.files
            cd ..

      - name: Sync Packages to OneDrive
        env:
          RCLONE_CONFIG_BODY: ${{ secrets.RCLONE_CONFIG_DATA }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BODY" > ~/.config/rclone/rclone.conf
          # Wysyłamy tylko paczki (bez bazy .db), aby oszczędzać transfer w Gitubie
          rclone copy x86_64/ onedrive_personal:Arch/x86_64/ --include "*.pkg.tar.zst"

      - name: Commit Database to GitHub
        run: |
          git config --global user.name "ArchRepoBot"
          git config --global user.email "bot@github.com"
          # Dodajemy tylko małe pliki bazy (git zignoruje paczki przez .gitignore)
          git add x86_64/*.db x86_64/*.files
          git commit -m "Weekly Repo Update: $(date +'%Y-%m-%d')"
          git push
